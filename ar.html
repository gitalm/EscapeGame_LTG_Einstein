<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AR — Aufbauprüfung</title>
  <!-- lokale KaTeX CSS -->
  <link rel="stylesheet" href="vendor/katex.min.css">
  <style>
    body, html { height:100%; margin:0; font-family: Arial, Helvetica, sans-serif; }
    #ui { position: absolute; z-index: 2000; left:12px; top:12px; background: rgba(0,0,0,0.45); color:#fff; padding:8px; border-radius:8px; min-width:160px; }
    #ui button { margin-right:8px; padding:8px 10px; border-radius:6px; border:none; cursor:pointer; }
    #ui .btn-primary{ background:#0b84ff; color:#fff; }
    #locked { position: absolute; z-index: 2001; left:50%; top:20%; transform: translateX(-50%); background:#fff; color:#111; padding:14px; border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,0.12); max-width:360px; }
    a-scene { position: absolute; left:0; top:0; width:100%; height:100%; }
    /* Overlay für Aufgabe (wird KaTeX-gerendert) */
    #assignmentOverlay {
      display:none;
      position: absolute;
      z-index: 2001;
      left:50%;
      bottom:12%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      color:#111;
      padding:12px;
      border-radius:10px;
      max-width:90%;
      box-shadow:0 6px 18px rgba(0,0,0,0.15);
      font-size:16px;
    }
    #assignmentOverlay .closeBtn {
      display:inline-block; float:right; margin-left:8px; background:#eee; padding:4px 8px; border-radius:6px; cursor:pointer;
    }
    #unlockInfo { display:block; margin-top:6px; font-size:13px; color:#e8f4ff; }
  </style>
</head>
<body>
  <div id="ui">
    <button id="back" class="btn-primary">Zurück</button>
    <span id="status">initialisiert...</span>
    <div id="unlockInfo" style="display:none;"></div>
  </div>

  <div id="locked" style="display:none;">
    <h3 id="lockedTitle">Sperre</h3>
    <p id="lockedMsg">Dieses AR‑Prüfmodul ist noch nicht freigeschaltet.</p>
    <div style="margin-top:8px;">
      <a id="toQuiz" class="btn-primary" href="#">Quiz öffnen</a>
      <a id="toIndex" style="margin-left:8px; padding:8px 10px; background:#eee; color:#111; text-decoration:none; border-radius:6px;" href="index.html">Übersicht</a>
    </div>
  </div>

  <!-- Overlay zeigt Aufgabe / Formeln via KaTeX -->
  <div id="assignmentOverlay">
    <span class="closeBtn" id="closeAssignment">✕</span>
    <div id="assignmentContent"></div>
  </div>

  <a-scene id="scene" embedded mindar-image="autoStart: false" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-camera position="0 0 0"></a-camera>
    <a-entity id="targetEntity" mindar-image-target="targetIndex: 0">
      <a-gltf-model id="model" src="" position="0 0 0" rotation="0 0 0" scale="0 0 0" visible="false"></a-gltf-model>
      <a-entity id="tip" position="0 -0.6 0.05" visible="false">
        <a-plane color="#000" opacity="0.7" width="1.6" height="0.32"></a-plane>
        <a-entity id="tipText" text="value: ; color: #fff; align: center; width: 1.4" position="0 0 0.01"></a-entity>
      </a-entity>
    </a-entity>
  </a-scene>

  <script src="js/utils.js"></script>
  <script>
    (async function(){
      const topicId = utils.getParam('topic') || '';
      const statusEl = document.getElementById('status');
      const backBtn = document.getElementById('back');
      const lockedBox = document.getElementById('locked');
      const toQuiz = document.getElementById('toQuiz');
      const unlockInfoEl = document.getElementById('unlockInfo');
      const assignmentOverlay = document.getElementById('assignmentOverlay');
      const assignmentContent = document.getElementById('assignmentContent');
      const closeAssignment = document.getElementById('closeAssignment');

      backBtn.addEventListener('click', async () => {
        try {
          const sys = document.querySelector('a-scene').systems['mindar-image-system'];
          if (sys && sys.stop) await sys.stop();
        } catch(e){}
        window.location.href = 'index.html';
      });

      closeAssignment.addEventListener('click', () => { assignmentOverlay.style.display = 'none'; });

      if (!topicId){
        statusEl.textContent = 'Kein Thema';
        return;
      }

      let tasks;
      try { tasks = await utils.loadJSON('data/tasks.json'); } catch(e){ statusEl.textContent = 'Fehler tasks.json'; console.error(e); return; }
      const topic = tasks.topics.find(t => t.id === topicId);
      if (!topic){ statusEl.textContent = 'Thema nicht gefunden'; return; }

      toQuiz.href = 'quiz.html?topic=' + encodeURIComponent(topicId);

      // Zeige Unlock‑Info aus localStorage (nützlich zum Debugging)
      const unlockedPayload = utils.getUnlocked(topicId);
      if (unlockedPayload) {
        const d = new Date(unlockedPayload.ts);
        unlockInfoEl.style.display = 'block';
        unlockInfoEl.textContent = `Freigabe: ja — Score: ${Math.round((unlockedPayload.score||0)*100)}% (Ts: ${d.toLocaleString()})`;
      } else {
        unlockInfoEl.style.display = 'block';
        unlockInfoEl.textContent = 'Freigabe: nein';
      }

      const required = topic.unlock && topic.unlock.requiredCorrect;
      if (!utils.isUnlocked(topicId, required)){
        document.getElementById('lockedTitle').textContent = 'AR gesperrt';
        document.getElementById('lockedMsg').textContent = 'Bitte löse zuerst das Quiz, um den Aufbau prüfen zu können.';
        lockedBox.style.display = 'block';
        statusEl.textContent = 'gesperrt';
        return;
      }

      // unlocked -> initialize AR
      lockedBox.style.display = 'none';
      statusEl.textContent = 'lade AR...';
      utils.unlockAudio();

      // helper: lade Scripts (lokal vendor zuerst, dann CDN)
      function loadScriptPrefer(list){
        return new Promise((resolve, reject) => {
          let idx = 0;
          function attempt(){
            if (idx >= list.length) return reject(new Error('Skript konnte nicht geladen werden: ' + list[0]));
            const src = list[idx++];
            const s = document.createElement('script');
            s.src = src;
            s.defer = true;
            s.onload = () => resolve(src);
            s.onerror = () => attempt();
            document.head.appendChild(s);
          }
          attempt();
        });
      }

      // Lade A-Frame + MindAR (lokal vendor bevorzugt)
      try {
        await loadScriptPrefer(['vendor/aframe.min.js', 'aframe.min.js', 'https://cdn.jsdelivr.net/npm/aframe@1.4.1/dist/aframe.min.js']);
        await loadScriptPrefer(['vendor/mindar-image-aframe.prod.js', 'mindar-image-aframe.prod.js', 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js']);
      } catch(e){
        console.error('Bibliotheken konnten nicht geladen werden', e);
        statusEl.textContent = 'Libraries fehlen';
        return;
      }

      // Lade KaTeX JS & auto-render (lokal vendor zuerst)
      try {
        await loadScriptPrefer(['vendor/katex.min.js', 'https://cdn.jsdelivr.net/npm/katex@0.13.24/dist/katex.min.js']);
        await loadScriptPrefer(['vendor/auto-render.min.js', 'https://cdn.jsdelivr.net/npm/katex@0.13.24/dist/contrib/auto-render.min.js']);
      } catch(e){
        console.warn('KaTeX konnte nicht geladen werden — Formeln werden nicht gerendert', e);
      }

      // Szene konfigurieren
      const scene = document.getElementById('scene');
      scene.setAttribute('mindar-image', 'imageTargetSrc: assets/targets.mind; maxTrack: 1;');
      const targetEntity = document.getElementById('targetEntity');
      targetEntity.setAttribute('mindar-image-target', 'targetIndex: ' + (topic.mindar && topic.mindar.targetIndex || 0));
      const model = document.getElementById('model');
      const modelSrc = (topic.mindar && topic.mindar.model) || 'assets/gltf/scene.gltf';
      model.setAttribute('src', modelSrc);

      // Warten auf MindAR system
      try {
        const sys = await waitForMindarSystem(8000);
        await sys.start();
        statusEl.textContent = 'scanne Target';
      } catch(e){
        console.error(e);
        statusEl.textContent = 'AR konnte nicht gestartet werden';
        return;
      }

      // model handlers: automatische Skalierung, Fallbackscale
      model.addEventListener('model-loaded', () => {
        try {
          const threeObj = model.getObject3D('mesh') || model.getObject3D('model') || model.getObject3D('scene');
          if (threeObj){
            const box = new THREE.Box3().setFromObject(threeObj);
            const size = new THREE.Vector3(); box.getSize(size);
            const modelHeight = size.y > 0.001 ? size.y : Math.max(size.x, size.z);
            if (modelHeight > 0) {
              const desired = 0.6;
              const f = desired / modelHeight;
              model.setAttribute('scale', `${f} ${f} ${f}`);
            } else {
              model.setAttribute('scale', '0.4 0.4 0.4');
            }
          } else {
            model.setAttribute('scale', '0.4 0.4 0.4');
          }
        } catch(e){
          model.setAttribute('scale', '0.4 0.4 0.4');
        }
      });

      // On found: show model, show assignment overlay (KaTeX rendered)
      targetEntity.addEventListener('targetFound', () => {
        model.setAttribute('visible', 'true');
        model.removeAttribute('animation__scale');
        const scaleAttr = model.getAttribute('scale') || '0.4 0.4 0.4';
        model.setAttribute('animation__scale', 'property: scale; from: 0 0 0; to: ' + scaleAttr + '; dur: 600; easing: easeOutCubic');

        const tip = document.getElementById('tip');
        const tipText = document.getElementById('tipText');
        tipText.setAttribute('text', 'value', topic.assignment);
        tip.setAttribute('visible', 'true');

        assignmentContent.innerHTML = topic.assignment;
        if (window.renderMathInElement) {
          try { renderMathInElement(assignmentContent, {delimiters: [{left:'$$', right:'$$', display:true}, {left:'$', right:'$', display:false}], throwOnError:false}); } catch(e){ console.warn('KaTeX render error', e); }
        }
        assignmentOverlay.style.display = 'block';
        utils.speakText(topic.assignment);
      });

      targetEntity.addEventListener('targetLost', () => {
        model.setAttribute('visible', 'false');
        model.setAttribute('scale', '0 0 0');
        const tip = document.getElementById('tip');
        tip.setAttribute('visible', 'false');
        assignmentOverlay.style.display = 'none';
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
      });

      // Hilfsfunktionen
      function waitForMindarSystem(timeout = 8000){
        return new Promise((resolve, reject) => {
          const start = Date.now();
          (function check(){
            const sys = scene && scene.systems ? scene.systems['mindar-image-system'] : null;
            if (sys) return resolve(sys);
            if (Date.now() - start > timeout) return reject(new Error('MindAR system nicht verfügbar'));
            setTimeout(check, 100);
          })();
        });
      }
    })();
  </script>
</body>
</html>
