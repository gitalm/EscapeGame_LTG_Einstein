<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AR Lernspiel — Schaltungen</title>
  <style>
    :root { --accent: #0b84ff; --bg: #fafafa; --card: #fff; --text:#222; }

    * { box-sizing: border-box; -webkit-tap-highlight-color: rgba(0,0,0,0); }
    body { margin:0; font-family: Inter, Roboto, Arial, sans-serif; color:var(--text); background:var(--bg); -webkit-font-smoothing:antialiased; }
    .view { position:fixed; inset:0; display:flex; align-items:flex-start; justify-content:center; padding:28px; }
    .container { width:100%; max-width:760px; }
    header h1 { margin:0 0 12px 0; font-size:20px; }
    .card { background:var(--card); padding:14px; border-radius:10px; box-shadow:0 6px 18px rgba(10,10,10,0.06); margin-bottom:12px; }
    .btn { display:inline-block; background:var(--accent); color:#fff; border:none; padding:14px 18px; font-size:16px; border-radius:10px; cursor:pointer; text-align:center; }
    .btn.secondary { background:#eee; color:#111; }
    .topicBtn { width:100%; text-align:left; padding:16px; font-size:18px; border-radius:10px; margin-bottom:10px; cursor:pointer; border:1px solid rgba(0,0,0,0.04); background:#fff; }
    .small { font-size:13px; color:#666; }
    .hidden { display:none !important; }
    a-scene { position:fixed !important; top:0; left:0; width:100% !important; height:100% !important; }
    #arControls { position: absolute; top:12px; left:12px; z-index:9999; background: rgba(0,0,0,0.45); color:#fff; padding:10px; border-radius:10px; display:flex; gap:8px; flex-direction:column; }
    #backBtn { padding:10px 12px; font-size:16px; border-radius:8px; border:none; background:#fff; color:#111; cursor:pointer; }
    #status { font-size:14px; color:#fff; }
    .question { margin-bottom:14px; }
    .option { display:block; background:#fff; padding:12px; margin:8px 0; border-radius:8px; border:1px solid rgba(0,0,0,0.06); cursor:pointer; }
    .footer { display:flex; gap:8px; margin-top:10px; }
    button, .topicBtn, .option { touch-action: manipulation; }
    .bigClick { padding:16px 18px; font-size:18px; border-radius:10px; }
  </style>

  <!-- KaTeX lokal (falls vorhanden) -->
  <link rel="stylesheet" href="katex.min.css">
  <script defer src="katex.min.js.js"></script>
  <script defer src="auto-render.min.js.js"></script>

  <!-- Lade A-Frame lokal wenn vorhanden, sonst CDN. MindAR laden wir erst beim AR-Start (lokal bevorzugt). -->
  <script>
    (function(){
      function loadAFrame(cb) {
        var s = document.createElement('script');
        s.defer = true;
        s.onload = cb;
        s.onerror = function(){
          var s2 = document.createElement('script');
          s2.defer = true;
          s2.onload = cb;
          s2.src = 'https://cdn.jsdelivr.net/npm/aframe@1.4.1/dist/aframe.min.js';
          document.head.appendChild(s2);
        };
        // lokale Datei (falls vorhanden)
        s.src = 'aframe.min.js';
        document.head.appendChild(s);
      }
      loadAFrame(function(){ console.log('AFRAME geladen'); });
    })();
  </script>
</head>
<body>
  <!-- HOME -->
  <div id="home" class="view">
    <div class="container">
      <header class="card">
        <h1>AR Lernspiel — Themen</h1>
        <p class="small">Wähle ein Thema. Zuerst beantwortest du Fragen, danach bekommst du den Experimentierauftrag und kannst den Aufbau prüfen (AR).</p>
      </header>

      <div class="card">
        <h2 style="margin-top:0">Themen</h2>
        <button class="topicBtn" data-topic="schaltung">Schaltungen (Reihen- & Parallelschaltung)</button>
        <button class="topicBtn" data-topic="magnetismus">Magnetismus (demnächst)</button>
      </div>

      <div class="card">
        <h2 style="margin-top:0">Schnellzugriff</h2>
        <button id="openQuiz" class="btn bigClick">Quiz starten</button>
      </div>
    </div>
  </div>

  <!-- QUIZ VIEW -->
  <div id="quizView" class="view hidden">
    <div class="container">
      <div class="card">
        <button id="quizBack" class="btn secondary">Zurück</button>
        <h2 id="quizTitle">Quiz</h2>
        <div id="quizContent"></div>
        <div id="quizFooter" class="footer" style="margin-top:12px;">
          <button id="prevQ" class="btn secondary">Zurück</button>
          <button id="nextQ" class="btn">Weiter</button>
          <button id="submitQuiz" class="btn" style="display:none">Abschicken</button>
        </div>
      </div>
      <div id="resultCard" class="card hidden"></div>
    </div>
  </div>

  <!-- AR VIEW -->
  <div id="arView" class="view hidden" style="padding:0;">
    <div id="arControls">
      <button id="backBtn">Zurück</button>
      <div id="status">Bereit</div>
    </div>

    <a-scene id="scene"
             color-space="sRGB"
             renderer="colorManagement: true, physicallyCorrectLights"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="dynamicTarget" mindar-image-target="targetIndex: 0">
        <a-gltf-model id="taskModel"
                      src="assets/gltf/scene.gltf"
                      position="0 0 0"
                      rotation="0 0 0"
                      scale="0 0 0"
                      visible="false"></a-gltf-model>

        <a-entity id="tipText" position="0 -0.6 0.05" visible="false">
          <a-plane color="#000" opacity="0.7" width="1.6" height="0.32"></a-plane>
          <a-entity id="tipTextInner" text="value: ; color: #fff; align: center; width: 1.4" position="0 0 0.01"></a-entity>
        </a-entity>
      </a-entity>
    </a-scene>
  </div>

  <script>
    // ---------- Konfiguration ----------
    const topics = {
      schaltung: { title: 'Schaltungen', questionFile: 'assets/questions/schaltung.json', assignment: 'Baue die Reihenschaltung wie im Lehrbuch und messe den Strom.', targetIndex: 0, model: 'assets/gltf/scene.gltf' },
      magnetismus: { title: 'Magnetismus', questionFile: 'assets/questions/magnetismus.json', assignment: 'Auftrag folgt', targetIndex: 1, model: 'assets/gltf/scene.gltf' }
    };
    let selectedTopic = 'schaltung';
    const desiredHeight = 0.8;
    let mindarLoaded = false;
    let mindarSystem = null;
    let arActive = false;

    // DOM
    const home = document.getElementById('home');
    const quizView = document.getElementById('quizView');
    const arView = document.getElementById('arView');
    const quizTitle = document.getElementById('quizTitle');
    const quizContent = document.getElementById('quizContent');
    const resultCard = document.getElementById('resultCard');
    const status = document.getElementById('status');

    const scene = document.getElementById('scene');
    const dynamicTarget = document.getElementById('dynamicTarget');
    const taskModel = document.getElementById('taskModel');
    const tipText = document.getElementById('tipText');
    const tipTextInner = document.getElementById('tipTextInner');

    // Quiz state
    let questions = [];
    let currentQ = 0;
    let answers = [];

    // ---------- Math rendering helper (KaTeX auto-render) ----------
    function renderMathIn(el) {
      if (window.renderMathInElement) {
        try {
          renderMathInElement(el, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$',  right: '$',  display: false}
            ],
            throwOnError: false
          });
        } catch (e) { console.warn('KaTeX render error', e); }
      }
    }

    // ---------- UI Helpers ----------
    function show(view) {
      home.classList.add('hidden');
      quizView.classList.add('hidden');
      arView.classList.add('hidden');
      if (view === 'home') home.classList.remove('hidden');
      if (view === 'quiz') quizView.classList.remove('hidden');
      if (view === 'ar') arView.classList.remove('hidden');
    }

    // Topic buttons
    document.querySelectorAll('.topicBtn').forEach(b => {
      b.addEventListener('click', () => {
        selectedTopic = b.dataset.topic;
        openQuiz(selectedTopic);
      });
    });
    document.getElementById('openQuiz').addEventListener('click', () => openQuiz(selectedTopic));
    document.getElementById('quizBack').addEventListener('click', () => show('home'));

    // ---------- Quiz Loading ----------
    async function openQuiz(topicKey) {
      const t = topics[topicKey];
      selectedTopic = topicKey;
      quizTitle.textContent = t.title || 'Quiz';
      currentQ = 0; answers = [];
      resultCard.classList.add('hidden');
      quizContent.innerHTML = '<div class="small">Fragen werden geladen...</div>';
      show('quiz');

      try {
        const res = await fetch(t.questionFile);
        if (!res.ok) throw new Error('kein JSON');
        questions = await res.json();
      } catch (e) {
        console.warn('Fragen konnten nicht geladen werden, benutze Fallback', e);
        if (topicKey === 'schaltung') {
          questions = [
            { question: 'In einer Reihenschaltung ist der Strom...', options: ['gleich in allen Bauteilen','abhängig vom Widerstand','größer im ersten Bauteil'], answer: 0 },
            { question: 'In einer Parallelschaltung ist die Spannung...', options: ['gleich über jedem Zweig','aufgeteilt','null'], answer: 0 }
          ];
        } else {
          questions = [{ question: 'Beispielfrage', options: ['A','B','C'], answer: 0 }];
        }
      }
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[currentQ];
      if (!q) { quizContent.innerHTML = '<div>Keine Fragen.</div>'; return; }
      quizContent.innerHTML = '';
      const qEl = document.createElement('div');
      qEl.className = 'question';
      qEl.innerHTML = `<h3>Frage ${currentQ+1} / ${questions.length}</h3><p>${q.question}</p>`;
      quizContent.appendChild(qEl);
      const opts = document.createElement('div');
      q.options.forEach((opt, idx) => {
        const label = document.createElement('label');
        label.className = 'option';
        label.innerHTML = `<input type="radio" name="opt" value="${idx}" ${answers[currentQ]===idx? 'checked' : ''}> ${opt}`;
        label.addEventListener('click', () => {
          answers[currentQ] = idx;
          const radios = opts.querySelectorAll('input');
          radios.forEach(r => r.checked = (r.value == idx));
        });
        opts.appendChild(label);
      });
      quizContent.appendChild(opts);
      document.getElementById('prevQ').style.display = currentQ === 0 ? 'none' : 'inline-block';
      document.getElementById('nextQ').style.display = currentQ === questions.length -1 ? 'none' : 'inline-block';
      document.getElementById('submitQuiz').style.display = currentQ === questions.length -1 ? 'inline-block' : 'none';

      // KaTeX render (falls Formeln im JSON)
      renderMathIn(quizContent);
    }

    document.getElementById('prevQ').addEventListener('click', () => {
      if (currentQ>0) { currentQ--; renderQuestion(); }
    });
    document.getElementById('nextQ').addEventListener('click', () => {
      if (currentQ < questions.length -1) { currentQ++; renderQuestion(); }
    });

    document.getElementById('submitQuiz').addEventListener('click', () => {
      let correct = 0;
      for (let i=0;i<questions.length;i++){
        if (answers[i] === questions[i].answer) correct++;
      }
      const pct = Math.round(100 * correct / questions.length);
      resultCard.classList.remove('hidden');
      resultCard.innerHTML = `<h3>Ergebnis</h3><p>Richtig: ${correct} / ${questions.length} (${pct}%)</p>
        <p><strong>Auftrag:</strong> ${topics[selectedTopic].assignment}</p>
        <div style="margin-top:10px;">
          <button id="toArBtn" class="btn bigClick">Aufbau prüfen (AR)</button>
          <button id="backHome" class="btn secondary">Zurück zur Übersicht</button>
        </div>`;
      document.getElementById('toArBtn').addEventListener('click', () => startARForTopic(selectedTopic));
      document.getElementById('backHome').addEventListener('click', () => show('home'));

      // KaTeX render für resultCard (z. B. Formeln in explanation)
      renderMathIn(resultCard);

      quizContent.innerHTML = '';
    });

    // ---------- TTS: Default voice ----------
    function speakText(text) {
      if (!('speechSynthesis' in window)) return;
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'de-DE';
      utt.rate = 1;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utt);
    }
    try { if ('speechSynthesis' in window) { const u = new SpeechSynthesisUtterance(''); u.volume = 0; speechSynthesis.speak(u); } } catch(e){}

    // ---------- MindAR Dynamisch Laden & Setup (lokal bevorzugt) ----------
    function loadMindARScript() {
      return new Promise((resolve, reject) => {
        if (mindarLoaded) return resolve();
        const s = document.createElement('script');
        s.defer = true;
        // lokale Datei zuerst
        s.src = 'mindar-image-aframe.prod.js';
        s.onload = () => { mindarLoaded = true; console.log('Lokales MindAR geladen'); resolve(); };
        s.onerror = function() {
          // Fallback: aus assets (falls du die Datei in assets/ abgelegt hast)
          var s2 = document.createElement('script');
          s2.defer = true;
          s2.onload = () => { mindarLoaded = true; console.log('MindAR geladen (fallback)'); resolve(); };
          s2.onerror = function(){
            // CDN fallback
            var s3 = document.createElement('script');
            s3.defer = true;
            s3.onload = () => { mindarLoaded = true; console.log('MindAR CDN geladen'); resolve(); };
            s3.onerror = () => reject(new Error('MindAR load failed'));
            s3.src = 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js';
            document.head.appendChild(s3);
          };
          // versuche assets/mindar-image-aframe.prod.js (falls du dort die Datei hast)
          s2.src = 'assets/mindar-image-aframe.prod.js';
          document.head.appendChild(s2);
        };
        document.head.appendChild(s);
      });
    }

    async function startARForTopic(topicKey) {
      const t = topics[topicKey];
      try {
        await loadMindARScript();
      } catch (e) {
        alert('MindAR konnte nicht geladen werden. Prüfe Dateien oder Internetverbindung.');
        return;
      }

      // setze mindar-image-attribute auf Szene (erst jetzt)
      scene.setAttribute('mindar-image', `imageTargetSrc: assets/nft_input/targets.mind; maxTrack: 2;`);
      dynamicTarget.setAttribute('mindar-image-target', `targetIndex: ${t.targetIndex}`);
      taskModel.setAttribute('src', t.model || 'assets/gltf/scene.gltf');
      taskModel.setAttribute('rotation', '0 0 0');
      taskModel.setAttribute('scale', '0 0 0');
      taskModel.setAttribute('visible', 'false');

      try {
        mindarSystem = await waitForMindarSystem();
      } catch (e) {
        console.error('MindAR system nicht verfügbar', e);
        alert('AR System nicht bereit.');
        return;
      }

      // Event-Handler nur einmal setzen (vorher entfernen)
      try { taskModel.removeEventListener('model-loaded', onModelLoaded); } catch(e){}
      taskModel.addEventListener('model-loaded', onModelLoaded);
      try { dynamicTarget.removeEventListener('targetFound', onTargetFound); dynamicTarget.removeEventListener('targetLost', onTargetLost); } catch(e){}
      dynamicTarget.addEventListener('targetFound', onTargetFound);
      dynamicTarget.addEventListener('targetLost', onTargetLost);

      show('ar');
      status.textContent = 'AR wird gestartet...';
      try {
        await mindarSystem.start();
        arActive = true;
        status.textContent = 'AR läuft — Target scannen';
      } catch (e) {
        console.error('Fehler beim Starten von AR', e);
        status.textContent = 'Fehler beim Starten der Kamera';
      }
    }

    function waitForMindarSystem(timeout = 6000) {
      return new Promise((resolve, reject) => {
        const start = Date.now();
        (function check(){
          const sys = scene && scene.systems ? scene.systems['mindar-image-system'] : null;
          if (sys) return resolve(sys);
          if (Date.now() - start > timeout) return reject(new Error('MindAR system nicht verfügbar'));
          setTimeout(check, 100);
        })();
      });
    }

    // ---------- Model autoscale / show handlers ----------
    function onModelLoaded() {
      const final = computeFinalScale(taskModel, desiredHeight);
      if (final) {
        taskModel.dataset.finalScale = final;
        taskModel.setAttribute('scale', '0 0 0');
        taskModel.setAttribute('visible', 'false');
      } else {
        console.warn('Final scale konnte nicht berechnet werden');
      }
    }

    function computeFinalScale(el, desiredHeightMeters) {
      try {
        const obj = el.getObject3D('mesh') || el.getObject3D('model') || el.getObject3D('scene');
        if (!obj) return null;
        const box = new THREE.Box3().setFromObject(obj);
        const size = new THREE.Vector3(); box.getSize(size);
        const modelHeight = size.y > 0.001 ? size.y : Math.max(size.x, size.z);
        if (modelHeight <= 0) return null;
        const scaleFactor = desiredHeightMeters / modelHeight;
        return `${scaleFactor} ${scaleFactor} ${scaleFactor}`;
      } catch (e) {
        console.warn('computeFinalScale error', e);
        return null;
      }
    }

    function onTargetFound() {
      if (!arActive) return;
      const final = taskModel.dataset.finalScale || '0.4 0.4 0.4';
      taskModel.setAttribute('visible', 'true');
      taskModel.removeAttribute('animation__scale');
      taskModel.setAttribute('animation__scale', `property: scale; from: 0 0 0; to: ${final}; dur: 600; easing: easeOutCubic`);
      const t = topics[selectedTopic];
      if (t && t.assignment) {
        tipTextInner.setAttribute('text', 'value', t.assignment);
        tipText.setAttribute('visible', 'true');
        speakText(t.assignment);
      }
    }

    function onTargetLost() {
      taskModel.setAttribute('visible', 'false');
      taskModel.removeAttribute('animation__scale');
      taskModel.setAttribute('scale', '0 0 0');
      tipText.setAttribute('visible', 'false');
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    }

    // ---------- Back / Stop AR ----------
    document.getElementById('backBtn').addEventListener('click', async () => {
      try {
        if (mindarSystem && typeof mindarSystem.stop === 'function') {
          await mindarSystem.stop();
        } else {
          const sys = scene && scene.systems ? scene.systems['mindar-image-system'] : null;
          if (sys && typeof sys.stop === 'function') await sys.stop();
        }
      } catch (e) { console.warn('Fehler beim Stoppen von AR', e); }
      arActive = false;
      taskModel.setAttribute('visible', 'false');
      taskModel.setAttribute('scale', '0 0 0');
      tipText.setAttribute('visible', 'false');
      show('home');
      status.textContent = 'Bereit';
      mindarSystem = null;
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
      // Entferne MindAR-bezogene Attribute optional, damit beim nächsten Start sauber neu gesetzt wird
      try {
        scene.removeAttribute('mindar-image');
      } catch(e){}
    });

    // ---------- Debug & Hinweise ----------
    setTimeout(() => {
      if (typeof AFRAME === 'undefined') console.warn('AFRAME ist nicht geladen. Stelle sicher, dass aframe.min.js im Repo liegt oder CDN erreichbar ist.');
    }, 1500);
  </script>
</body>
</html>
