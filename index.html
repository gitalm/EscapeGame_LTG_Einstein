<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MindAR Minimal Test</title>
  <style>body{margin:0;background:#000;color:#fff;font-family:Arial}#ui{position:fixed;left:10px;top:10px;z-index:100}</style>
</head>
<body>
  <div id="ui">
    <button id="startBtn">Start AR (Kamera)</button>
    <div id="status">Warte...</div>
  </div>

  <!-- A-Frame (einmal) -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <!-- MindAR (nach A-Frame) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar/dist/mindar-image-aframe.prod.js"></script>

  <a-scene mindar-image="imageTargetSrc: assets/nft_input/targets.mind; maxTrack: 3;" embedded vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">
    <a-assets>
      <a-asset-item id="einModel" src="assets/gltf/scene.gltf"></a-asset-item>
    </a-assets>

    <!-- Test: ein target mit glTF als Kind -->
    <a-entity id="target-0" mindar-image-target="targetIndex: 0">
      <a-entity gltf-model="#einModel" scale="0.02 0.02 0.02" rotation="0 180 0"></a-entity>
    </a-entity>

    <!-- Kamera -->
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const status = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    startBtn.addEventListener('click', async () => {
      status.textContent = 'Starte...';
      const scene = document.querySelector('a-scene');
      // warte kurz, bis system verfügbar ist
      let sys = scene && scene.systems && scene.systems['mindar-image-system'];
      let tries = 0;
      while (!sys && tries++ < 50) {
        await new Promise(r => setTimeout(r, 100));
        sys = scene.systems && scene.systems['mindar-image-system'];
      }
      if (!sys) { status.textContent = 'MindAR System nicht gefunden'; console.error('MindAR system fehlt'); return; }
      try {
        await sys.start(); // fordert Kamera an
        status.textContent = 'AR läuft. Scanne Target.';
        scene.addEventListener('renderstart', () => { console.log('renderstart'); });
      } catch (e) {
        console.error(e); status.textContent = 'Startfehler: ' + e.message;
      }
    });
  </script>
</body>
</html>
