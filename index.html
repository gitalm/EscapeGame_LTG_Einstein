<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Escape-AR — Übersicht</title>
  <style>
    body{ font-family: Arial, Helvetica, sans-serif; margin:18px; background:#f6f7fb; color:#111; }
    .card{ background:#fff; padding:14px; border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,0.06); margin-bottom:12px; }
    .btn{ display:inline-block; padding:10px 14px; border-radius:8px; background:#0b84ff; color:#fff; text-decoration:none; }
    .btn.secondary{ background:#eee; color:#111; margin-left:8px; }
    header h1{ margin:0 0 6px 0; }
    .small{ color:#555; font-size:14px; }
    .status{ float:right; font-weight:600; }
  </style>
</head>
<body>
  <header class="card">
    <h1>Escape Game — Aufgaben</h1>
    <p class="small">Wähle ein Thema. Nach Bestehen des Quiz wird das AR‑Prüfmodul für den praktischen Aufbau freigeschaltet.</p>
  </header>

  <div id="list"></div>

  <script src="js/utils.js"></script>
  <script>
    (async function(){
      const container = document.getElementById('list');
      let tasks;
      try {
        tasks = await utils.loadJSON('data/tasks.json');
      } catch(e) {
        container.innerHTML = '<div class="card">Fehler: tasks.json konnte nicht geladen werden.</div>';
        console.error(e);
        return;
      }
      tasks.topics.forEach(t => {
        const unlocked = utils.isUnlocked(t.id, t.unlock && t.unlock.requiredCorrect);
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<h3 style="margin:0">${t.title} <span class="status">${unlocked? 'freigeschaltet' : 'gesperrt'}</span></h3>
                         <p class="small">${t.description}</p>
                         <div style="margin-top:10px;">
                           <a class="btn" href="quiz.html?topic=${encodeURIComponent(t.id)}">Quiz starten</a>
                           <a class="btn secondary" href="ar.html?topic=${encodeURIComponent(t.id)}">Aufbau prüfen (AR)</a>
                         </div>`;
        container.appendChild(div);
      });
    })();
  </script>
</body>
</html>
