<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>AR Aufgaben — Scene.gltf</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; }
    #home, #arView { position:fixed; inset:0; display:flex; align-items:flex-start; justify-content:center; }
    #home { background:#fafafa; padding:40px; }
    #taskList { width:100%; max-width:600px; }
    .task { background:#fff; padding:12px 16px; margin:8px 0; border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,0.08); cursor:pointer; }
    #arControls { position: absolute; top:12px; left:12px; z-index:9999; }
    #backBtn { padding:8px 12px; }
    a-scene { position:fixed !important; top:0; left:0; width:100% !important; height:100% !important; }
  </style>

  <!-- A-Frame per CDN (wichtig: zuerst A-Frame) -->
  <script src="https://unpkg.com/aframe@1.4.1/dist/aframe.min.js"></script>
  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <div id="home">
    <div id="taskList">
      <h1>Aufgaben</h1>
      <div id="tasksContainer"></div>
      <p>Klicke eine Aufgabe, um die AR‑Ansicht zu öffnen.</p>
    </div>
  </div>

  <div id="arView" style="display:none;">
    <div id="arControls">
      <button id="backBtn">Zurück</button>
      <span id="status">Bereit</span>
      <br>
      Stimme: <select id="voiceSelect"></select>
    </div>

    <a-scene id="scene" mindar-image="imageTargetSrc: assets/nft_input/targets.mind; maxTrack: 2;"
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights"
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- dynamische Target-Entity (targetIndex wird gesetzt) -->
      <a-entity id="dynamicTarget" mindar-image-target="targetIndex: 0">
        <!-- Nutze deine vorhandene scene.gltf -->
        <a-gltf-model id="taskModel" src="assets/gltf/scene.gltf" position="0 0 0" rotation="0 180 0" scale="0 0 0" visible="false"></a-gltf-model>

        <a-entity id="tipText" position="0 -0.5 0.05" visible="false">
          <a-plane color="#000" opacity="0.7" width="1.4" height="0.28"></a-plane>
          <a-entity id="tipTextInner" text="value: ; color: #fff; align: center; width: 1.2" position="0 0 0.01"></a-entity>
        </a-entity>
      </a-entity>
    </a-scene>
  </div>

  <script>
    // Tasks konfigurieren: targetIndex angeben (0..N entsprechend deiner targets.mind)
    const tasks = [
      { name: 'Schaltplan erstellen', hint: 'Erstelle den Schaltplan wie gezeigt.', targetIndex: 0, model: 'assets/gltf/scene.gltf' },
      { name: 'Bauteil prüfen', hint: 'Kontrolliere das Bauteil auf Beschädigungen.', targetIndex: 1, model: 'assets/gltf/scene.gltf' },
      // weitere Aufgaben hier hinzufügen
    ];

    const tasksContainer = document.getElementById('tasksContainer');
    const home = document.getElementById('home');
    const arView = document.getElementById('arView');
    const backBtn = document.getElementById('backBtn');
    const status = document.getElementById('status');
    const voiceSelect = document.getElementById('voiceSelect');

    const scene = document.getElementById('scene');
    const dynamicTarget = document.getElementById('dynamicTarget');
    const taskModel = document.getElementById('taskModel');
    const tipText = document.getElementById('tipText');
    const tipTextInner = document.getElementById('tipTextInner');

    let currentTaskIndex = null;
    const desiredHeight = 0.5; // gewünschte Modellhöhe in Metern (anpassen)

    // Liste füllen
    tasks.forEach((t,i) => {
      const el = document.createElement('div');
      el.className = 'task';
      el.textContent = t.name;
      el.onclick = () => startTask(i);
      tasksContainer.appendChild(el);
    });

    // TTS Utilities
    function listVoices() { return window.speechSynthesis ? window.speechSynthesis.getVoices() : []; }
    function pickMaleGermanVoice() {
      const maleNames = ['Markus','Thomas','Michael','Peter','Stefan','Jan','Paul','David','Daniel','Jonas','Tom','Mark','Hans'];
      const voices = listVoices();
      const deVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('de'));
      for (const n of maleNames) {
        const m = deVoices.find(v => v.name && v.name.toLowerCase().includes(n.toLowerCase()));
        if (m) return m;
      }
      if (deVoices.length) return deVoices[0];
      return voices[0] || null;
    }
    function populateVoiceSelect() {
      const voices = listVoices();
      voiceSelect.innerHTML = '';
      voices.forEach((v,i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${v.name} (${v.lang})`;
        voiceSelect.appendChild(opt);
      });
      const auto = pickMaleGermanVoice();
      if (auto) {
        const idx = voices.indexOf(auto);
        if (idx >= 0) voiceSelect.value = idx;
      }
    }
    if ('speechSynthesis' in window) {
      if (speechSynthesis.getVoices().length) populateVoiceSelect();
      else speechSynthesis.onvoiceschanged = populateVoiceSelect;
      try { const u = new SpeechSynthesisUtterance(''); u.volume = 0; speechSynthesis.speak(u); } catch(e) {}
    } else { voiceSelect.style.display = 'none'; }

    function speakText(text) {
      if (!('speechSynthesis' in window)) return;
      const utt = new SpeechSynthesisUtterance(text);
      const voices = listVoices();
      const sel = voices[voiceSelect.value];
      if (sel) utt.voice = sel;
      utt.lang = sel && sel.lang ? sel.lang : 'de-DE';
      utt.rate = 1;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utt);
    }

    // Start Task: setze targetIndex und (falls nötig) Modellpfad, starte AR
    async function startTask(i) {
      currentTaskIndex = i;
      const task = tasks[i];
      home.style.display = 'none';
      arView.style.display = 'flex';
      status.textContent = 'Lade AR...';

      // targetIndex setzen
      dynamicTarget.setAttribute('mindar-image-target', `targetIndex: ${task.targetIndex}`);

      // Modellpfad setzen (verwende vorhandene scene.gltf)
      taskModel.setAttribute('src', task.model);
      taskModel.setAttribute('visible', 'false');
      taskModel.setAttribute('scale', '0 0 0');

      // MindAR starten (Kamera/Tracking)
      try {
        const sys = scene.systems['mindar-image-system'];
        await sys.start();
        status.textContent = 'AR läuft — Target scannen';
      } catch (e) {
        console.error('AR Start Fehler', e);
        status.textContent = 'Fehler beim Starten von AR';
      }

      // Berechne Scale sobald Modell geladen (falls model-loaded schon passiert, Event dennoch feuert)
      const loaded = new Promise(resolve => {
        const onLoaded = () => {
          taskModel.removeEventListener('model-loaded', onLoaded);
          try {
            const obj = taskModel.getObject3D('mesh') || taskModel.getObject3D('model') || taskModel.getObject3D('scene');
            const box = new THREE.Box3().setFromObject(obj);
            const size = new THREE.Vector3(); box.getSize(size);
            const modelHeight = size.y > 0.001 ? size.y : Math.max(size.x, size.z);
            const scaleFactor = (modelHeight > 0) ? (desiredHeight / modelHeight) : 0.2;
            taskModel.dataset.finalScale = `${scaleFactor} ${scaleFactor} ${scaleFactor}`;
          } catch(e) { console.warn('Auto scale failed', e); }
          resolve(true);
        };
        const onErr = (e) => { taskModel.removeEventListener('model-error', onErr); console.error('model-error', e); resolve(false); };
        taskModel.addEventListener('model-loaded', onLoaded);
        taskModel.addEventListener('model-error', onErr);
        setTimeout(() => resolve(false), 5000);
      });

      await loaded;
    }

    // Events für Target found/lost
    dynamicTarget.addEventListener('targetFound', () => {
      const final = taskModel.dataset.finalScale || '0.2 0.2 0.2';
      taskModel.setAttribute('visible', 'true');
      taskModel.removeAttribute('animation__scale');
      taskModel.setAttribute('animation__scale', `property: scale; from: 0 0 0; to: ${final}; dur: 500; easing: easeOutCubic`);
      const task = tasks[currentTaskIndex];
      if (task) {
        tipTextInner.setAttribute('text', 'value', task.hint);
        tipText.setAttribute('visible', 'true');
        speakText(task.hint);
      }
    });

    dynamicTarget.addEventListener('targetLost', () => {
      taskModel.setAttribute('visible', 'false');
      taskModel.removeAttribute('animation__scale');
      taskModel.setAttribute('scale', '0 0 0');
      tipText.setAttribute('visible', 'false');
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    });

    // Back: stop AR & zurück zur Startseite
    backBtn.addEventListener('click', async () => {
      try {
        const sys = scene.systems['mindar-image-system'];
        if (sys) await sys.stop();
      } catch (e) { console.warn('Fehler beim Stoppen von AR', e); }
      home.style.display = 'flex';
      arView.style.display = 'none';
      status.textContent = 'Bereit';
      currentTaskIndex = null;
    });

  </script>
</body>
</html>
