<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Physik Escape - Einstein Lab</title>
  
  <!-- A-Frame & AR.js (NFT Version) -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <!-- jsQR für QR-Modus -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <style>
    body { margin: 0; font-family: sans-serif; background: #000; color: white; }
    #startOverlay { position: fixed; z-index: 10000; width: 100%; height: 100%; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #container { position: fixed; width: 100%; height: 100%; display: none; }
    #speech-bubble { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(0,0,0,0.9); padding: 20px; border: 2px solid #4fc3f7; border-radius: 15px; display: none; z-index: 2000; }
    .answer-btn { background: #4fc3f7; border: none; padding: 10px; margin: 5px; border-radius: 5px; cursor: pointer; }
    #progress { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 10px; z-index: 1000; }
  </style>
</head>
<body>

  <div id="startOverlay">
    <h1>Physik Escape: Einstein Lab</h1>
    <button id="startBtn" style="padding: 20px 40px; font-size: 1.5em;">Experiment starten</button>
  </div>

  <div id="container">
    <!-- AR Szene -->
    <a-scene embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">
      <!-- NFT-Marker (Deine Schaltung) -->
      <a-nft type="nft" url="./assets/nft/versuch1" smooth="true" smoothCount="10">
        <a-entity gltf-model="./assets/gltf/scene.gltf" scale="5 5 5"></a-entity>
      </a-nft>
      <a-entity camera></a-entity>
    </a-scene>
  </div>

  <div id="progress">Fortschritt: 0/4</div>
  
  <div id="speech-bubble">
    <h2 id="stationTitle">Station</h2>
    <p id="questionText"></p>
    <div id="answerButtons"></div>
  </div>

  <script>
    let gameData = {};
    let state = { solved: new Set(), currentTarget: null };

    // Daten laden
    async function init() {
      const res = await fetch('./assets/data.json');
      gameData = await res.json();
    }

    // Fragen anzeigen
    function showQuestion(targetId) {
      const target = gameData.targets.find(t => t.id === targetId);
      const q = target.questions[0]; // Vereinfacht: erste Frage
      
      document.getElementById('stationTitle').textContent = target.name;
      document.getElementById('questionText').textContent = q.question;
      const btnArea = document.getElementById('answerButtons');
      btnArea.innerHTML = '';
      
      q.answers.forEach((ans, i) => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.textContent = ans;
        btn.onclick = () => {
          if(i === q.correct) {
            state.solved.add(targetId);
            document.getElementById('progress').textContent = `Fortschritt: ${state.solved.size}/4`;
            document.getElementById('speech-bubble').style.display = 'none';
          }
        };
        btnArea.appendChild(btn);
      });
      document.getElementById('speech-bubble').style.display = 'block';
    }

    // QR-Scan Event
    // Hier müsstest du den jsQR Loop von vorhin einbauen
    // und bei Erfolg: showQuestion(targetId) aufrufen

    document.getElementById('startBtn').onclick = () => {
        document.getElementById('startOverlay').style.display = 'none';
        document.getElementById('container').style.display = 'block';
        init();
    };
  </script>
</body>
</html>
