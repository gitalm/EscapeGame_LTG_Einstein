<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EscapeGame — MindAR mit Einstein</title>
  <style>
    html,body { height:100%; margin:0; }
    a-scene, .a-scene { position: fixed !important; top:0; left:0; width:100% !important; height:100% !important; }
    video, canvas { position: fixed !important; top:0; left:0; width:100% !important; height:100% !important; object-fit: cover; }
    #ui { position: fixed; left:10px; top:10px; z-index:9999; background: rgba(0,0,0,0.45); color:#fff; padding:8px; border-radius:6px; font-family: Arial, sans-serif; }
    button { padding:6px 10px; }
  </style>

  <script src="aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <div id="ui">
    <button id="startBtn">Start AR</button>
    <span id="status" style="margin-left:8px">Bereit</span>
  </div>

  <a-scene mindar-image="imageTargetSrc: assets/nft_input/targets.mind; maxTrack: 1;"
           color-space="sRGB"
           renderer="colorManagement: true, physicallyCorrectLights"
           vr-mode-ui="enabled: false"
           device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="targetImg" src="assets/nft_input/schaltung.jpg" />
      <!-- Dein existierendes Modell -->
      <a-asset-item id="myModel" src="assets/gltf/scene.gltf"></a-asset-item>
      <!-- Einstein-Modell: passe den Pfad an oder lege das Model genau dort ab -->
      <a-asset-item id="einsteinModelAsset" src="assets/gltf/scene.gltf"></a-asset-item>
      <!-- Optional: statt TTS eine Sprachdatei (falls vorhanden) -->
      <!-- <audio id="tipAudio" src="assets/audio/tipp1_de.mp3"></audio> -->
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target-Entity -->
    <a-entity id="targetEntity" mindar-image-target="targetIndex: 0">
      <a-plane src="#targetImg" position="0 0 0" height="0.5" width="0.9"></a-plane>

      <!-- Dein Hauptmodell (sichtbar wie vorher) -->
      <a-gltf-model id="mainModel" src="#myModel" position="0 0 0.1" rotation="0 180 0" scale="0.02 0.02 0.02"
                    animation="property: position; to: 0 0.12 0.1; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate">
      </a-gltf-model>

      <!-- Einstein-Modell: standardmäßig unsichtbar -->
      <a-gltf-model id="einstein" src="#einsteinModelAsset" position="0 0 0.12" rotation="0 180 0" scale="0.02 0.02 0.02"
                    visible="false">
      </a-gltf-model>

      <!-- Text-Bubble unter Einstein (standardmäßig unsichtbar) -->
      <a-entity id="tipText" position="0 -0.25 0.05" visible="false">
        <a-plane color="#000" opacity="0.6" width="1.2" height="0.25" position="0 0 0"></a-plane>
        <a-entity text="value: ; color: #fff; align: center; width: 1.0" position="0 0 0.01" id="tipTextInner"></a-entity>
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');

    startBtn.addEventListener('click', async () => {
      status.textContent = 'Warte auf Assets...';
      const scene = document.querySelector('a-scene');
      const assets = document.querySelector('a-assets');

      await new Promise(resolve => {
        if (!assets || assets.hasAttribute('loaded')) return resolve();
        const onLoaded = () => { assets.removeEventListener('loaded', onLoaded); resolve(); };
        assets.addEventListener('loaded', onLoaded);
        setTimeout(resolve, 5000);
      });

      // wart auf model-loaded der beiden Modelle (optional)
      const einstein = document.getElementById('einstein');
      const mainModel = document.getElementById('mainModel');
      await Promise.all(['model-loaded','model-loaded'].map((evt, i) => new Promise(res => {
        const el = i===0 ? mainModel : einstein;
        if (!el) return res();
        if (el.getObject3D && el.getObject3D('mesh')) return res();
        const handler = () => { el.removeEventListener('model-loaded', handler); res(); };
        el.addEventListener('model-loaded', handler);
        setTimeout(res, 5000);
      })));

      try {
        const sys = scene.systems['mindar-image-system'];
        if (!sys) throw new Error('MindAR system nicht gefunden');
        await sys.start();
        status.textContent = 'AR läuft — Target scannen';
      } catch (e) {
        console.error(e);
        status.textContent = 'Fehler: ' + (e.message || e);
      }
    });

    // Wenn Target gefunden: Einstein sichtbar machen und Tipp sprechen/anzeigen
    const targetEntity = document.getElementById('targetEntity');
    const einsteinEl = document.getElementById('einstein');
    const tipTextEl = document.getElementById('tipText');
    const tipTextInner = document.getElementById('tipTextInner');
    // Optional audio element fallback:
    // const tipAudio = document.getElementById('tipAudio');

    // Der Text, den Einstein sagen soll (anpassen)
    const nextHint = "Gut gemacht! Dein nächster Hinweis befindet sich beim großen roten Bild im Erdgeschoss. Gehe dorthin, um weiterzumachen.";

    targetEntity.addEventListener('targetFound', () => {
      // Einstein einblenden
      if (einsteinEl) einsteinEl.setAttribute('visible', 'true');
      // Text-Bubble anzeigen
      if (tipTextEl) {
        tipTextInner.setAttribute('text', 'value', nextHint); // setzt Text
        tipTextEl.setAttribute('visible', 'true');
      }
      // Sprach-Ausgabe per Web Speech API (TTS)
      speakText(nextHint);
      // Wenn du stattdessen eine Audio-Datei nutzen willst:
      // if (tipAudio) tipAudio.play();
    });

    targetEntity.addEventListener('targetLost', () => {
      if (einsteinEl) einsteinEl.setAttribute('visible', 'false');
      if (tipTextEl) tipTextEl.setAttribute('visible', 'false');
      // Stoppe laufende Sprachausgabe, falls nötig
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
      // if (tipAudio) { tipAudio.pause(); tipAudio.currentTime = 0; }
    });

    function speakText(text) {
      if (!('speechSynthesis' in window)) {
        console.log('TTS nicht verfügbar. Text:', text);
        return;
      }
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'de-DE'; // oder 'en-US' je nach Sprache
      utter.rate = 1; // Geschwindigkeit anpassen
      window.speechSynthesis.speak(utter);
    }
  </script>
</body>
</html>
