<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Physik Escape</title>
  <!-- A-Frame & AR.js -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    
    /* AR Szene immer im Hintergrund */
    #arScene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    
    /* UI Layer oben drauf */
    #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
    
    .bubble { 
      position: absolute; bottom: 20px; left: 5%; width: 90%; 
      background: rgba(0,0,0,0.85); border: 2px solid #4fc3f7;
      padding: 20px; border-radius: 20px; color: white;
      pointer-events: auto; display: none;
    }
    
    .btn { background: #4fc3f7; border: none; padding: 10px 20px; margin: 5px; border-radius: 20px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <!-- AR SZENE -->
  <a-scene id="arScene" embedded arjs="debugUIEnabled: false;">
    
    <!-- 1. Der AR Marker für Einstein (Nutze hier deine .patt Datei) -->
    <a-marker type="pattern" url="./assets/patt/pattern-magnet.patt">
      <!-- Einstein Figur mit Animation -->
      <a-entity id="einstein" class="clickable">
        <a-box color="#8B4513" depth="0.5" height="1" width="0.5"></a-box>
        <a-sphere color="#FFE4C4" radius="0.3" position="0 0.8 0"></a-sphere>
        <!-- Interaktions-Hitbox für Klick -->
        <a-box id="einsteinHit" position="0 0.5 0" width="1" height="2" depth="1" opacity="0"></a-box>
      </a-entity>
    </a-marker>
    
    <a-entity camera></a-entity>
  </a-scene>

  <!-- UI LAYER -->
  <div id="ui">
    <div id="bubble" class="bubble">
      <h2 id="title">Professor Einstein</h2>
      <p id="text">„Willkommen im Labor! Finde die QR-Codes!“</p>
      <div id="btns"></div>
    </div>
  </div>

  <script>
    // Einstein Klick-Logik
    document.querySelector('#einsteinHit').addEventListener('click', () => {
      document.getElementById('text').textContent = "„Gut gemacht! Jetzt scanne den QR-Code für Magnetismus!“";
      document.getElementById('bubble').style.display = 'block';
    });

    // QR-Code Logik (behalte deinen jsQR Code von vorher hier)
    // Wenn QR erkannt: showQuestion(0);
  </script>
</body>
</html>
